<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceCalc Pro</title>
    <meta name="description" content="Calculadora financeira avançada com juros simples, compostos, simulador de investimentos e empréstimos. Visualizações interativas com Chart.js e modo escuro." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#820ad1">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF & SheetJS CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>
<body>
    <header class="header">
        <h1>FinanceCalc Pro</h1>
        <div class="header-actions">
            <button id="pwa-install" class="btn btn-primary" style="display: none; padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Instalar App
            </button>
            <button id="theme-toggle" aria-label="Alternar modo escuro">🌙</button>
        </div>
    </header>
    <nav class="nav">
        <ul>
            <li><a href="#" data-section="simple-interest">Juros Simples</a></li>
            <li><a href="#" data-section="compound-interest">Juros Compostos</a></li>
            <li><a href="#" data-section="investment-simulator">Investimentos</a></li>
            <li><a href="#" data-section="loan-simulator">Empréstimos</a></li>
            <li><a href="#" data-section="dashboard">Dashboard</a></li>
        </ul>
    </nav>
    <main id="main-content">
        <!-- Sections will be injected by app.js -->
    </main>
    <footer class="footer">
        <p>&copy; 2026 FinanceCalc Pro – Todos os direitos reservados.</p>
    </footer>
    <script type="module" src="js/app.js"></script>
</body>
</html>
